<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Text Extractor</title>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 3px 5px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
            color: #1976d2;
            margin-bottom: 16px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .file-input {
            display: block;
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #fff;
        }
        .file-label {
            display: inline-block;
            padding: 8px 16px;
            background-color: #1976d2;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 8px;
        }
        .file-label:hover {
            background-color: #1565c0;
        }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #1976d2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        .submit-btn:hover {
            background-color: #1565c0;
        }
        .submit-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .loading {
            text-align: center;
            margin-top: 16px;
        }
        .result {
            margin-top: 16px;
            padding: 16px;
            background-color: #e8f5e8;
            border: 1px solid #4caf50;
            border-radius: 4px;
            white-space: pre-wrap;
        }
        .error {
            margin-top: 16px;
            padding: 16px;
            background-color: #ffebee;
            border: 1px solid #f44336;
            border-radius: 4px;
            color: #c62828;
        }
        .selected-file {
            margin-bottom: 8px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Image Text Extractor</h1>
        <form id="uploadForm">
            <div class="form-group">
                <label class="file-label" for="imageInput">Select Image</label>
                <input type="file" id="imageInput" accept="image/*" style="display: none;">
                <div id="selectedFile" class="selected-file"></div>
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">Extract Text</button>
        </form>
        <div id="loading" class="loading" style="display: none;">Processing... Please wait.</div>
        <div id="error" class="error" style="display: none;"></div>
        <div id="result" class="result" style="display: none;"></div>
    </div>

    <script>
        console.log('Page loaded');

        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            console.log('Form submitted');

            const fileInput = document.getElementById('imageInput');
            const resultDiv = document.getElementById('result');
            const errorDiv = document.getElementById('error');
            const loadingDiv = document.getElementById('loading');
            const submitBtn = document.getElementById('submitBtn');

            if (!fileInput.files[0]) {
                console.log('No file selected');
                errorDiv.textContent = 'Please select an image.';
                errorDiv.style.display = 'block';
                resultDiv.style.display = 'none';
                return;
            }

            console.log('File selected:', fileInput.files[0].name);
            loadingDiv.style.display = 'block';
            errorDiv.style.display = 'none';
            resultDiv.style.display = 'none';
            submitBtn.disabled = true;

            try {
                console.log('Converting to base64');
                const base64 = await toBase64(fileInput.files[0]);
                console.log('Base64 length:', base64.length);

                console.log('Sending request to /ocr');
                const response = await fetch('/ocr', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ image: base64 })
                });

                console.log('Response status:', response.status);
                const data = await response.json();
                console.log('Response data:', data);

                if (response.ok) {
                    resultDiv.textContent = 'Extracted Text:\n' + (data.text || 'No text found in the image.');
                    resultDiv.style.display = 'block';
                } else {
                    errorDiv.textContent = 'Error: ' + data.error;
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                console.log('Error:', error);
                errorDiv.textContent = 'Error: ' + error.message;
                errorDiv.style.display = 'block';
            } finally {
                loadingDiv.style.display = 'none';
                submitBtn.disabled = false;
            }
        });

        document.getElementById('imageInput').addEventListener('change', function(e) {
            const selectedFileDiv = document.getElementById('selectedFile');
            if (e.target.files[0]) {
                selectedFileDiv.textContent = 'Selected: ' + e.target.files[0].name;
            } else {
                selectedFileDiv.textContent = '';
            }
        });

        function toBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = error => reject(error);
            });
        }

        console.log('Script loaded');
    </script>
</body>
</html>
</body>
</html>
